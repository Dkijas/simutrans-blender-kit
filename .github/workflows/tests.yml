name: tests

# The full suite needs Blender, makeobj and a headless Simutrans, none of which a
# standard runner has. This job runs the Blender-free half - the `core` suite,
# ~970 checks of pure-stdlib Python (projection, colours, the .dat linter, schema
# drift) - which is exactly the fast inner loop the README documents. It is enough
# to catch a regression in the geometry or the linter on every push.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # The Pythons the supported Blenders actually ship: Blender 4.0 bundles 3.10,
      # 4.1+/5.x bundle 3.11. 3.12 is included as forward cover. The core code uses
      # PEP 604 (`str | None`) at runtime, so 3.10 is the real floor.
      matrix:
        python-version: [ '3.10', '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Core suite (Blender-free)
        run: python tools/run_tests.py core
